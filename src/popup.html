<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Auto Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 480px;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e1e2e;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #7c6af7;
      box-shadow: 0 0 8px #7c6af7;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: 13px;
      font-weight: normal;
      color: #7c6af7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    label {
      display: block;
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 90px;
      background: #111118;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #e8e8f0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #7c6af7;
    }

    .section { margin-bottom: 16px; }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="number"] {
      width: 70px;
      background: #111118;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #e8e8f0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 8px;
      outline: none;
    }

    input[type="number"]:focus { border-color: #7c6af7; }

    .hint { font-size: 10px; color: #444; flex: 1; }

    .prefix-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      background: #111118;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #e8e8f0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 8px;
      outline: none;
    }

    input[type="text"]:focus { border-color: #7c6af7; }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    #startBtn {
      background: #7c6af7;
      color: #fff;
    }

    #startBtn:hover { background: #6a58e0; }
    #startBtn:disabled { background: #2a2a3e; color: #444; cursor: not-allowed; }

    #stopBtn {
      background: #1e1e2e;
      color: #e8e8f0;
      border: 1px solid #2a2a3e;
    }

    #stopBtn:hover { border-color: #f74a4a; color: #f74a4a; }

    #manualBtn {
      background: #1e1e2e;
      color: #7c6af7;
      border: 1px solid #2a2a3e;
      flex: none;
      padding: 10px 14px;
    }

    #manualBtn:hover { border-color: #7c6af7; }

    .status-box {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      padding: 10px;
      min-height: 60px;
      font-size: 11px;
      line-height: 1.6;
      color: #666;
    }

    .status-box .log-line { color: #888; }
    .status-box .log-ok   { color: #4af7a0; }
    .status-box .log-err  { color: #f74a4a; }
    .status-box .log-info { color: #7c6af7; }

    .counter {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #444;
      margin-top: 8px;
    }

    .counter span { color: #7c6af7; }

    .divider {
      height: 1px;
      background: #1e1e2e;
      margin: 14px 0;
    }

    /* Toggle switch */
    .toggle-container {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle-input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-label {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #2a2a3e;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-label::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #666;
      top: 3px;
      left: 3px;
      transition: all 0.3s;
    }

    .toggle-input:checked + .toggle-label {
      background: #7c6af7;
      box-shadow: 0 0 10px rgba(124, 106, 247, 0.4);
    }

    .toggle-input:checked + .toggle-label::after {
      transform: translateX(18px);
      background: #fff;
    }

    .upscale-badge {
      font-size: 9px;
      background: #7c6af7;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      font-weight: bold;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .upscale-badge.active {
      opacity: 1;
      box-shadow: 0 0 8px rgba(124, 106, 247, 0.5);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h1>Flow Auto Generator</h1>
  </div>

  <div class="section">
    <label>Prompt</label>
    <textarea id="prompt" placeholder="A cat dancing in neon rain..."></textarea>
  </div>

  <div class="section">
    <label>Batch Settings</label>
    <div class="row">
      <input type="number" id="count" value="1" min="1" max="50" title="How many times to generate">
      <div class="hint">generations · delay between each:</div>
      <input type="number" id="delay" value="30" min="10" max="120" style="width:60px" title="Seconds between generations">
      <div class="hint">sec</div>
    </div>
  </div>

  <div class="section">
    <label>File Prefix (optional)</label>
    <input type="text" id="prefix" placeholder="myproject_" value="flow_">
  </div>

  <div class="section">
    <label>Upscale Options</label>
    <div class="row">
      <div class="toggle-container">
        <input type="checkbox" id="upscale2k" class="toggle-input">
        <label for="upscale2k" class="toggle-label"></label>
      </div>
      <div class="hint">Upscale images to 2K</div>
      <span class="upscale-badge" id="upscaleBadge">2560×1440</span>
    </div>
  </div>

  <div class="btn-group">
    <button id="startBtn">▶ Start Auto</button>
    <button id="manualBtn" title="Inject prompt once and click generate">⚡ Once</button>
    <button id="stopBtn">■ Stop</button>
  </div>

  <div class="divider"></div>

  <label>Status Log</label>
  <div class="status-box" id="statusBox">
    <div class="log-line">Ready. Open a Google Flow project tab first.</div>
  </div>

  <div class="counter">
    <div>Generated: <span id="doneCount">0</span></div>
    <div>Remaining: <span id="remCount">—</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
